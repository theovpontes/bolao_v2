<style>
/* ====== VISUAL ORIGINAL DO BOLÃO (grafite / azul-aço, claro+escuro) ====== */

/* ===== prorrogação / pênaltis ===== */
.extra-box { margin-top: 10px; border-top: 1px dashed var(--borda2); padding-top: 10px; }

<body>
<div id="app"><div class="vazio">Carregando…</div></div>
<div class="flash" id="flash"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   As chaves ficam no TOPO do arquivo (procure SUPABASE_URL lá em cima).
   Não precisa mexer aqui.
   ============================================================ */
const SUPABASE_URL      = window.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
const EMAIL_DOMAIN      = "@bolao.local";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===== estado ===== */
const S = { auth:null, me:null, matches:[], preds:[], users:[], specials:[], validations:[], settings:{},
            tab:'palpites', atab:'resultados', grupo:'todos', soPend:true, verPessoa:null,
            authMode:'login', authErr:null, busy:false };

/* ===== bandeiras ===== */
const CC = {
 "Mexico":"mx","South Africa":"za","South Korea":"kr","Czechia":"cz","Canada":"ca","Qatar":"qa","Switzerland":"ch",
 "Bosnia and Herzegovina":"ba","Brazil":"br","Haiti":"ht","Morocco":"ma","Scotland":"gb-sct","United States":"us",
 "Paraguay":"py","Australia":"au","Turkey":"tr","Türkiye":"tr","Germany":"de","Curaçao":"cw","Ecuador":"ec",
 "Ivory Coast":"ci","Netherlands":"nl","Japan":"jp","Tunisia":"tn","Sweden":"se","Belgium":"be","Iran":"ir",
 "Egypt":"eg","New Zealand":"nz","Spain":"es","Cape Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy","France":"fr",
 "Senegal":"sn","Iraq":"iq","Norway":"no","Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo",
 "Portugal":"pt","Uzbekistan":"uz","Colombia":"co","Congo DR":"cd","England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
};
function flag(team, h=16){
  const code = CC[team]; if(!code) return "";
  const w = team==="Switzerland" ? h : Math.round(h*1.5);
  return `<img class="flag" src="https://flagcdn.com/w80/${code}.png" alt="" loading="lazy" style="width:${w}px;height:${h}px" onerror="this.style.display='none'">`;
}

/* ===== datas ===== */
const TZ = "America/Sao_Paulo";
const fmtData = iso => {
  const d = new Date(iso);
  const dia = new Intl.DateTimeFormat("pt-BR",{weekday:"short",timeZone:TZ}).format(d).replace(".","");
  const dm  = new Intl.DateTimeFormat("pt-BR",{day:"2-digit",month:"2-digit",timeZone:TZ}).format(d);
  return `${dia} ${dm}`;
};
const fmtHora = iso => new Intl.DateTimeFormat("pt-BR",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:TZ}).format(new Date(iso));

/* ===== utilidades ===== */
const norm = s => (s||'').trim().toLowerCase();
function isLocked(iso){ return Date.now() >= new Date(iso).getTime(); }
function isKO(m){ return !m.group_name; }
function lateDeadline(){
  const s = S.settings.late_deadline; if(!s) return null;
  let t = String(s).trim().replace(' ','T'); if(/[+-]\d\d$/.test(t)) t += ':00';
  const d = new Date(t); return isNaN(d) ? null : d;
}
function lateOpen(m){ const dl=lateDeadline(); return !!(m.late_window && dl && Date.now() < dl.getTime()); }
function enterable(m){ return (!isLocked(m.kickoff_at)) || lateOpen(m); }
function myPred(id){ return S.preds.find(p=>p.user_id===S.me.id && p.match_id===id); }
function temPalpite90(p){ return !!(p && p.pred_home!=null && p.pred_away!=null); }
function isValidated(uid,mid){ return S.validations.some(v=>v.user_id===uid && v.match_id===mid); }
function toLocalInput(d){ if(!d) return ''; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ===== pontuação ===== */
const outcome = (h,a)=> h>a?"H":h<a?"A":"D";
function pts90(m,p){
  if(!p || m.result_home==null || m.result_away==null || p.pred_home==null || p.pred_away==null) return 0;
  if(p.pred_home===m.result_home && p.pred_away===m.result_away) return 3;
  if(outcome(p.pred_home,p.pred_away)===outcome(m.result_home,m.result_away)) return 1;
  return 0;
}
function ptsExtra(m,p){
  let x=0;
  if(m.et_outcome && p && p.pred_et && norm(p.pred_et)===norm(m.et_outcome)) x+=1;
  if(m.pen_winner && p && p.pred_pen && norm(p.pred_pen)===norm(m.pen_winner)) x+=1;
  return x;
}
function counts(m,p){
  if(!p) return 0;
  if(m.late_window && !isValidated(p.user_id,m.id)) return 0;
  return pts90(m,p)+ptsExtra(m,p);
}
function specialLocked(matches){
  const first=[...matches].sort((a,b)=>new Date(a.kickoff_at)-new Date(b.kickoff_at))[0];
  return first ? isLocked(first.kickoff_at) : false;
}
function pointsForSpecial(sp,champ,scorer){
  let p=0;
  if(champ && sp && norm(sp.champion)===norm(champ)) p+=10;
  if(scorer && sp && norm(sp.top_scorer)===norm(scorer)) p+=10;
  return p;
}
function buildRanking(){
  const champ=S.settings.champion||null, scorer=S.settings.top_scorer||null;
  return S.users.map(u=>{
    const mine=S.preds.filter(p=>p.user_id===u.id);
    let matchPoints=0, exact=0;
    for(const m of S.matches){
      const p=mine.find(x=>x.match_id===m.id);
      matchPoints+=counts(m,p);
      if(p && m.result_home!=null && p.pred_home===m.result_home && p.pred_away===m.result_away && !(m.late_window && !isValidated(u.id,m.id))) exact++;
    }
    const sp=S.specials.find(s=>s.user_id===u.id);
    const specialPoints=pointsForSpecial(sp,champ,scorer);
    return {userId:u.id,username:u.username,total:matchPoints+specialPoints,matchPoints,specialPoints,exactScores:exact};
  }).sort((a,b)=> b.total-a.total || b.exactScores-a.exactScores || (a.username||'').localeCompare(b.username||''));
}

/* ===== avanço automático do chaveamento ===== */
function winnerOf(m){
  if(!m) return null;
  if(m.winner_team) return m.winner_team;
  if(m.result_home==null||m.result_away==null) return null;
  if(m.result_home>m.result_away) return m.home_team;
  if(m.result_away>m.result_home) return m.away_team;
  return null;
}
function loserOf(m){ const w=winnerOf(m); if(!w) return null; return w===m.home_team?m.away_team:m.home_team; }
function resolveSource(src,byNo){ if(!src) return null; const t=src[0],no=parseInt(src.slice(1),10),ref=byNo[no]; if(!ref) return null; return t==="W"?winnerOf(ref):t==="L"?loserOf(ref):null; }
function bracketChanges(){
  const byNo={}; S.matches.forEach(m=>{ if(m.match_no!=null) byNo[m.match_no]=m; });
  const alvo=S.matches.filter(m=>m.home_source||m.away_source).sort((a,b)=>a.match_no-b.match_no);
  const out=[];
  for(const m of alvo){
    const nh=m.home_source?resolveSource(m.home_source,byNo):m.home_team;
    const na=m.away_source?resolveSource(m.away_source,byNo):m.away_team;
    const hf=nh??m.home_team, af=na??m.away_team;
    if(hf!==m.home_team||af!==m.away_team){ m.home_team=hf; m.away_team=af; out.push({id:m.id,home_team:hf,away_team:af}); }
  }
  return out;
}

/* ===== dados ===== */
async function fetchAll(table, cols='*'){
  const tam=1000; let de=0, tudo=[];
  while(true){
    const { data, error } = await sb.from(table).select(cols).range(de, de+tam-1);
    if(error){ console.error('Erro lendo '+table, error); break; }
    tudo = tudo.concat(data||[]);
    if(!data || data.length < tam) break;
    de += tam;
  }
  return tudo;
}
async function loadAll(){
  const [mt, pr, us, sp, va, st] = await Promise.all([
    sb.from('matches').select('*').order('kickoff_at'),
    fetchAll('predictions'),
    fetchAll('users','id,username,role'),
    fetchAll('special_predictions'),
    fetchAll('validations'),
    sb.from('settings').select('*'),
  ]);
  S.matches=mt.data||[]; S.preds=pr||[]; S.users=us||[]; S.specials=sp||[]; S.validations=va||[];
  S.users.sort((a,b)=>(a.username||'').localeCompare(b.username||''));
  S.settings={}; (st.data||[]).forEach(r=> S.settings[r.key]=r.value);
}
async function refreshMe(){
  if(!S.auth){ S.me=null; return; }
  const { data } = await sb.from('users').select('id,username,role').eq('id', S.auth.id).maybeSingle();
  S.me = data || { id:S.auth.id, username:(S.auth.email||'').split('@')[0], role:'user' };
}

function filtra(lista,g){ if(g==='todos') return lista; if(g==='Mata-mata') return lista.filter(m=>!m.group_name); return lista.filter(m=>m.group_name===g); }

/* ---- card de palpite (90 min + prorrogação/pênaltis) ---- */
function blocoExtra(m,p,lock){
  const opt=(field,val,label)=>{
    const on=norm(p[field])===norm(val);
    return `<button class="opt ${on?'on':''} ${lock?'lock':''}" ${lock?'':`onclick="App.pickExtra(${m.id},'${field}','${(''+val).replace(/'/g,"\\'")}')"`}>${label}</button>`;
  };
  return `<div class="extra-box">
    <div class="extra-q">Se for pra prorrogação, quem vence? (+1)</div>
    <div class="opts">${opt('pred_et',m.home_team,m.home_team)}${opt('pred_et','Empate','Empate')}${opt('pred_et',m.away_team,m.away_team)}</div>
    <div class="extra-q">Se for pra pênaltis, quem vence? (+1)</div>
    <div class="opts">${opt('pred_pen',m.home_team,m.home_team)}${opt('pred_pen',m.away_team,m.away_team)}</div>
    <div class="hint">Vale mesmo se você errar o placar dos 90 min — e só conta se o jogo for pra lá.</div>
  </div>`;
}
function linhaPontos(m,p){
  const gate=m.late_window && !isValidated(S.me.id,m.id);
  const tot=gate?0:pts90(m,p)+ptsExtra(m,p);
  let det=`Resultado: ${m.result_home} × ${m.result_away}`;
  if(m.et_outcome) det+=` · prorrog.: ${m.et_outcome}`;
  if(m.pen_winner) det+=` · pênaltis: ${m.pen_winner}`;
  return `<div class="resultado-real">${det} <span class="pts-tag pts-${tot>=3?3:tot>=1?1:0}">+${tot} pts</span></div>`;
}
function cardPalpite(m){
  const p=myPred(m.id)||{};
  const lock=!enterable(m);
  const ko=isKO(m), hasRes=m.result_home!=null && m.result_away!=null;
  const validated=isValidated(S.me.id,m.id);
  return `<div class="jogo" data-card="${m.id}">
    <div class="jogo-topo"><div class="jogo-meta"><span class="grp-tag">${m.group_name?'Grupo '+m.group_name:m.stage}</span> ${fmtData(m.kickoff_at)} · ${fmtHora(m.kickoff_at)}h
      ${m.late_window?`<span class="badge-val ${validated?'badge-ok':'badge-pend'}">${validated?'validado':'aguardando validação'}</span>`:''}</div>
      <span class="estado ${lock?'fechado':'aberto'}">${lock?'fechado':'aberto'}</span></div>
    <div class="confronto">
      <div class="time dir">${m.home_team} ${flag(m.home_team,18)}</div>
      <input class="placar-in" type="number" min="0" inputmode="numeric" value="${p.pred_home??''}" ${lock?'disabled':''} data-side="h" onblur="App.savePalpite(${m.id})">
      <span class="x">×</span>
      <input class="placar-in" type="number" min="0" inputmode="numeric" value="${p.pred_away??''}" ${lock?'disabled':''} data-side="a" onblur="App.savePalpite(${m.id})">
      <div class="time">${flag(m.away_team,18)} ${m.away_team}</div>
    </div>
    ${ko?blocoExtra(m,p,lock):''}
    ${hasRes?linhaPontos(m,p):''}

function tabPalpites(){
  const locked=specialLocked(S.matches);

    <div class="esp-row"><label>Campeão</label><input id="sp-champ" ${locked?'disabled':''} value="${(sp.champion||'').replace(/"/g,'&quot;')}" placeholder="seleção campeã"></div>

function pessoaDetalhe(uid){
  const u=S.users.find(x=>x.id===uid)||{username:'?'};
  const mine=S.preds.filter(p=>p.user_id===uid);
  const sp=S.specials.find(s=>s.user_id===uid);
  const total=buildRanking().find(r=>r.userId===uid)?.total||0;
  const fechados=S.matches.filter(m=>isLocked(m.kickoff_at)).sort((a,b)=>new Date(b.kickoff_at)-new Date(a.kickoff_at));
  let h=`<button class="voltar" onclick="App.verPessoa(null)">← voltar</button><h3 style="margin-bottom:12px">Palpites de @${u.username} <small style="color:var(--aco)">— ${total} pts</small></h3>`;
  if(specialLocked(S.matches)) h+=`<div class="esp-card" style="padding:14px"><b>🏆 Campeão:</b> ${sp?.champion||'—'} &nbsp;·&nbsp; <b>👟 Artilheiro:</b> ${sp?.top_scorer||'—'}</div>`;
  if(fechados.length===0) return h+`<p class="vazio">Nenhum jogo começou ainda.</p>`;
  let lastDay='';
  for(const m of fechados){
    const dk=fmtData(m.kickoff_at), show=dk!==lastDay; if(show) lastDay=dk;
    const p=mine.find(x=>x.match_id===m.id);
    const hasRes=m.result_home!=null && m.result_away!=null;
    const gate=m.late_window && !isValidated(uid,m.id);
    const tot=gate?0:(p?pts90(m,p)+ptsExtra(m,p):0);
    h+=(show?`<div class="dia-sep">${dk}</div>`:'')+`<div class="jogo">
      <div class="jogo-meta" style="margin-bottom:7px"><span class="grp-tag">${m.group_name?'Grupo '+m.group_name:m.stage}</span> ${fmtHora(m.kickoff_at)}h ${m.late_window&&!isValidated(uid,m.id)?'<span class="badge-val badge-pend">não validado</span>':''}</div>
      <div class="confronto">
        <div class="time dir">${m.home_team} ${flag(m.home_team,16)}</div>
        <div style="font-weight:800;min-width:60px;text-align:center;font-size:16px">${p&&p.pred_home!=null?`${p.pred_home} × ${p.pred_away}`:'—'}</div>
        <div class="time">${flag(m.away_team,16)} ${m.away_team}</div>
      </div>
      ${(p&&(p.pred_et||p.pred_pen))?`<div class="hint">prorrog.: ${p.pred_et||'—'} · pênaltis: ${p.pred_pen||'—'}</div>`:''}
      ${hasRes?`<div class="resultado-real">Resultado ${m.result_home} × ${m.result_away} <span class="pts-tag pts-${tot>=3?3:tot>=1?1:0}">+${tot} pts</span></div>`:''}
    </div>`;
  }
  return h;
}

/* ---- Chaveamento ---- */
function tabChaveamento(){
  const byNo={}; S.matches.forEach(m=>{ if(m.match_no!=null) byNo[m.match_no]=m; });
  const colDef=[['Rodada de 32',[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]],['Oitavas',[89,90,91,92,93,94,95,96]],['Quartas',[97,98,99,100]],['Semifinal',[101,102]],['Final',[104]]];
  const linha=(team,score,isWin)=>{
    const tbd=!team||/^(Venc|Perd)\./.test(team)||team==='a definir';
    return `<div class="br-team ${isWin&&!tbd?'win':''} ${tbd?'tbd':''}">${tbd?'a definir':`${flag(team,14)} ${team}`}${(score!=null&&!tbd)?`<span class="sc">${score}</span>`:''}</div>`;
  };
  const card=no=>{ const m=byNo[no]; if(!m) return ''; const w=winnerOf(m);
    return `<div class="br-card ${no===104?'br-final':''}">${linha(m.home_team,m.result_home,w&&norm(w)===norm(m.home_team))}${linha(m.away_team,m.result_away,w&&norm(w)===norm(m.away_team))}</div>`; };
  const cols=colDef.map(([t,nos])=>`<div class="chave-col"><h4>${t}</h4>${nos.map(card).join('')}</div>`).join('');
  const champ=byNo[104]?winnerOf(byNo[104]):null;
  const extra=`<div class="chave-col"><h4>Campeão</h4><div class="br-camp">${champ?`${flag(champ,16)} ${champ}`:'🏆 a definir'}</div><h4 style="margin-top:14px">3º lugar</h4>${card(103)}</div>`;
  return `<p class="muted" style="font-size:13px;margin-bottom:8px">O quadro se preenche sozinho conforme os resultados são lançados. 👉 Arraste pro lado para ver todas as fases.</p>
    <div class="chave-wrap"><div class="chave">${cols}${extra}</div></div>`;
}

function tabRegras(){
  const txt=S.settings.regras||'O regulamento ainda não foi preenchido pelo admin.';
  return `<div class="card"><h3>📋 Regulamento</h3><div class="regras-txt">${txt.replace(/</g,'&lt;')}</div></div>`;
}

/* ===== ADMIN ===== */
function renderAdmin(){
  const dir=`<span>@${S.me.username}</span> <span class="badge-mod">admin</span>`;
  const tabs=[['resultados','Resultados'],['pontuacao','Pontuação'],['validar','Validar'],['gabarito','Gabarito'],['usuarios','Usuários'],['criar','Criar jogo'],['regras','Regras']]
    .map(([t,n])=>`<button class="${S.atab===t?'on':''}" onclick="App.setATab('${t}')">${n}</button>`).join('');
  let body;
  switch(S.atab){
    case 'pontuacao': body=tabPontuacao(); break;
    case 'validar': body=admValidar(); break;
    case 'gabarito': body=admGabarito(); break;
    case 'usuarios': body=admUsuarios(); break;
    case 'criar': body=admCriar(); break;
    case 'regras': body=admRegras(); break;
    default: body=admResultados();
  }
  setHTML(topo(dir,tabs)+`<main class="container">${body}</main>`);
}

function admResultados(){
  let h=chips(S.grupo,'setGrupo');
  h+='<p class="muted" style="font-size:13px;margin-bottom:10px">O placar salva sozinho ao sair do campo. No mata-mata, se empatar nos 90 min, escolha o que aconteceu na prorrogação/pênaltis.</p>';
  const jogos=filtra(S.matches,S.grupo); let lastDay='';
  for(const m of jogos){
    const dk=fmtData(m.kickoff_at), show=dk!==lastDay; if(show) lastDay=dk;
    const vh=m.result_home!=null?m.result_home:'', va=m.result_away!=null?m.result_away:'';
    const empateKO=m.result_home!=null && m.result_home===m.result_away && isKO(m);
    let extra='';
    if(empateKO){
      const b=(fn,val,lbl,sel)=>`<button class="${sel?'':'secondary'}" style="padding:5px 10px;font-size:12px" onclick="App.${fn}(${m.id},'${(''+val).replace(/'/g,"\\'")}')">${lbl}</button>`;
      extra=`<div class="win-sel">Prorrogação: ${b('setET',m.home_team,m.home_team,m.et_outcome===m.home_team)}${b('setET','Empate','Empate (foi pra pênaltis)',m.et_outcome==='Empate')}${b('setET',m.away_team,m.away_team,m.et_outcome===m.away_team)}</div>`;
      if(m.et_outcome==='Empate') extra+=`<div class="win-sel">Pênaltis: ${b('setPen',m.home_team,m.home_team,m.pen_winner===m.home_team)}${b('setPen',m.away_team,m.away_team,m.pen_winner===m.away_team)}</div>`;
    }
    h+=(show?`<div class="dia-sep">${dk}</div>`:'')+`<div class="jogo" data-card="${m.id}">
      <div class="jogo-topo"><div class="jogo-meta"><span class="grp-tag">${m.group_name?'Grupo '+m.group_name:m.stage}</span> ${dk} · ${fmtHora(m.kickoff_at)}h</div></div>
      <div class="confronto">
        <div class="time dir">${m.home_team} ${flag(m.home_team,17)}</div>
        <input class="placar-in" type="number" min="0" value="${vh}" data-side="h" onblur="App.saveResult(${m.id})">
        <span class="x">×</span>
        <input class="placar-in" type="number" min="0" value="${va}" data-side="a" onblur="App.saveResult(${m.id})">
        <div class="time">${flag(m.away_team,17)} ${m.away_team}</div>
      </div>${extra}</div>`;
  }
  if(jogos.length===0) h+='<p class="vazio">Nenhum jogo com esse filtro.</p>';
  return h;
}

function admValidar(){
  const late=S.matches.filter(m=>m.late_window).sort((a,b)=>a.match_no-b.match_no);
  let h=`<div class="card"><h3>Prazo da janela de palpites atrasados</h3>
    <p class="muted" style="font-size:13px">Até quando os participantes podem lançar no site os palpites que mandaram no WhatsApp.</p>
    <input id="dl" type="datetime-local" value="${toLocalInput(lateDeadline())}">
    <button style="margin-top:8px" onclick="App.saveDeadline()">Salvar prazo</button></div>`;
  if(late.length===0) return h+'<p class="vazio">Nenhum jogo na janela.</p>';
  h+='<p class="muted" style="font-size:13px;margin:14px 0 8px">Confira cada palpite com o WhatsApp e clique em <b>validar</b>. Só palpites validados contam pontos.</p>';
  for(const m of late){
    const ps=S.preds.filter(p=>p.match_id===m.id && (p.pred_home!=null||p.pred_et||p.pred_pen));
    h+=`<div class="acc aberto"><div class="acc-cab"><span class="acc-titulo">${flag(m.home_team,16)} ${m.home_team} × ${m.away_team} ${flag(m.away_team,16)} <span class="acc-pend">(${m.stage})</span></span></div><div class="acc-corpo">`;
    if(ps.length===0) h+='<p class="oculto">Ninguém lançou ainda.</p>';
    for(const p of ps){
      const u=S.users.find(x=>x.id===p.user_id), val=isValidated(p.user_id,m.id);
      const ex=[p.pred_et?`prorrog. ${p.pred_et}`:'',p.pred_pen?`pên. ${p.pred_pen}`:''].filter(Boolean).join(' · ');
      h+=`<div class="rev-linha"><span>@${u?u.username:'?'} — <b>${p.pred_home??'?'} × ${p.pred_away??'?'}</b>${ex?` <span class="muted">(${ex})</span>`:''}</span>
        <button class="${val?'':'secondary'}" style="padding:5px 12px;font-size:12px" onclick="App.toggleVal('${p.user_id}',${m.id})">${val?'✓ validado':'validar'}</button></div>`;
    }
    h+='</div></div>';
  }
  return h;
}

function admGabarito(){
  return `<div class="esp-card"><h3>🏆 Resultado final dos especiais</h3>
    <p class="muted" style="font-size:13px;margin:0 0 12px">Preencha no fim da Copa. Define quem ganha os 10+10.</p>
    <div class="esp-row"><label>Campeã</label><input id="g-champ" value="${(S.settings.champion||'').replace(/"/g,'&quot;')}" placeholder="seleção campeã"></div>
    <div class="esp-row"><label>Artilheiro</label><input id="g-scorer" value="${(S.settings.top_scorer||'').replace(/"/g,'&quot;')}" placeholder="nome do jogador"></div>
    <button style="margin-top:4px" onclick="App.saveWinners()">Salvar gabarito</button></div>`;
}
function admUsuarios(){
  return `<div class="card"><h3>Usuários</h3>
    <p class="muted" style="font-size:13px">Para redefinir a senha de alguém, use o painel do Supabase em <b>Authentication → Users</b>.</p>
    <table><thead><tr><th>Usuário</th><th>Tipo</th></tr></thead><tbody>
    ${S.users.map(u=>`<tr><td>@${u.username}</td><td>${u.role==='admin'?'<span class="badge-mod">admin</span>':'user'}</td></tr>`).join('')}
    </tbody></table></div>`;
}
function admCriar(){
  return `<div class="card"><h3>Criar jogo</h3>
    <p class="muted" style="font-size:13px;margin-bottom:12px">Os jogos do mata-mata já vêm prontos. Use só para algum jogo avulso.</p>
    <div class="grid">
      <div class="esp-row"><label>Nº</label><input id="c-no" type="number"></div>
      <div class="esp-row"><label>Fase</label><input id="c-stage" value="Mata-mata"></div>
      <div class="esp-row"><label>Grupo</label><input id="c-grupo" placeholder="A, B… ou vazio"></div>
      <div class="esp-row"><label>Mandante</label><input id="c-home"></div>
      <div class="esp-row"><label>Visitante</label><input id="c-away"></div>
      <div class="esp-row"><label>Data/hora</label><input id="c-kick" type="datetime-local"></div>
      <div class="esp-row"><label>Estádio</label><input id="c-venue"></div>
      <button style="margin-top:4px" onclick="App.criarJogo()">Criar jogo</button></div></div>`;
}
function admRegras(){
  return `<div class="card"><h3>📋 Editar regulamento</h3>
    <p class="muted" style="font-size:13px;margin-bottom:10px">Todos veem isto na aba "Regras". Mude com o consenso do grupo.</p>
    <textarea id="r-txt" rows="18">${(S.settings.regras||'').replace(/</g,'&lt;')}</textarea>
    <button style="margin-top:10px" onclick="App.saveRegras()">Salvar regras</button></div>`;
}

/* ===== boot ===== */
async function boot(){
  if(SUPABASE_URL.includes('SEU-PROJETO') || SUPABASE_ANON_KEY.includes('SUA_CHAVE')){
    setHTML(`<div class="login-wrap"><div class="login-card"><div class="crest">⚙️</div><h1>Falta configurar</h1>
      <p class="sub">Abra o arquivo e preencha <b>SUPABASE_URL</b> e <b>SUPABASE_ANON_KEY</b> no topo do código.</p></div></div>`);
    return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  S.auth = session?.user || null;
  if(S.auth){ await refreshMe(); await loadAll(); }
  render();
  sb.auth.onAuthStateChange(async (_e, sess)=>{
    const novo=sess?.user||null, mudou=(novo?.id||null)!==(S.auth?.id||null);
    S.auth=novo;
    if(novo && mudou){ await refreshMe(); await loadAll(); }
    if(!novo){ S.me=null; S.tab='palpites'; S.verPessoa=null; }
    render();
  });
}
boot();
</script>
